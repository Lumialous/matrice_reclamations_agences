<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrice Réclamations – Produits Digitaux | Orabank</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00c9a7;
    --accent2: #3b82f6;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --green: #22c55e;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    color: #000;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .version-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  /* SEARCH + FILTERS */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px 9px 36px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent2); }
  .search-box input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .filter-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,201,167,0.06);
  }

  .filter-btn.active { font-weight: 600; }

  /* LAYOUT */
  .main {
    display: flex;
    height: calc(100vh - 120px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar-section {
    padding: 0 12px;
    margin-bottom: 4px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 8px 12px 4px;
  }

  .product-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    margin-bottom: 2px;
  }

  .product-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  .product-item.selected {
    background: rgba(0,201,167,0.08);
    border-color: var(--accent);
  }

  .product-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .product-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .product-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .product-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .product-header-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .product-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .product-desc { font-size: 13px; color: var(--text-dim); max-width: 600px; }

  /* SCENARIO CARDS */
  .scenarios-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .scenario-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .scenario-card:hover { border-color: #2a3a52; }

  .scenario-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .scenario-type {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .type-reclamation { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .type-demande { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
  .type-incident { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .type-information { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }

  .scenario-title {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .sla-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    font-weight: 600;
    white-space: nowrap;
  }

  .sla-fast { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .sla-medium { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }
  .sla-slow { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

  .chevron {
    color: var(--text-muted);
    transition: transform 0.2s;
    font-size: 12px;
  }

  .scenario-card.open .chevron { transform: rotate(90deg); }

  .scenario-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .scenario-card.open .scenario-body { display: block; }

  .steps-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  .step-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }

  .step-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .step-block ul {
    list-style: none;
    padding: 0;
  }

  .step-block ul li {
    font-size: 11.5px;
    color: var(--text-dim);
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    gap: 6px;
    align-items: flex-start;
    line-height: 1.4;
  }

  .step-block ul li:last-child { border-bottom: none; }

  .step-block ul li::before {
    content: '›';
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 0;
  }

  .escalade-note {
    margin-top: 10px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11.5px;
    color: #93c5fd;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  /* Colors per step */
  .dot-prérequis { background: #a78bfa; }
  .dot-verification { background: var(--warn); }
  .dot-n1 { background: var(--accent); }
  .dot-n2 { background: var(--accent2); }

  .step-block.prérequis { border-color: rgba(167,139,250,0.2); }
  .step-block.verification { border-color: rgba(245,158,11,0.2); }
  .step-block.n1 { border-color: rgba(0,201,167,0.2); }
  .step-block.n2 { border-color: rgba(59,130,246,0.2); }

  /* WELCOME */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--text-muted);
    gap: 12px;
  }

  .welcome-icon { font-size: 48px; opacity: 0.3; }
  .welcome h2 { font-size: 16px; color: var(--text-dim); }
  .welcome p { font-size: 13px; max-width: 320px; }

  /* Print */
  @media print {
    header, .controls, .sidebar { display: none; }
    .main { height: auto; }
    .content { padding: 0; }
    .scenario-body { display: block !important; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .steps-row { grid-template-columns: 1fr 1fr; }
    .sidebar { display: none; }
  }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .quick-stats {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .stat-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .tag-reclamation { background: rgba(239,68,68,0.1); color: #fca5a5; }
  .tag-demande { background: rgba(59,130,246,0.1); color: #93c5fd; }
  .tag-incident { background: rgba(245,158,11,0.1); color: #fcd34d; }
  .tag-info { background: rgba(34,197,94,0.1); color: #86efac; }
</style>
</head>
<body>

<header>
  <div class="logo">

</div>

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentProduct = null;
let currentFilter = 'all';

// ─── RENDER SIDEBAR ─────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sidebar-label">Produits Digitaux</div>';
  products.forEach(p => {
    const div = document.createElement('div');
    div.className = 'sidebar-section';
    div.innerHTML = `
      <div class="product-item ${currentProduct === p.id ? 'selected' : ''}" onclick="selectProduct('${p.id}')">
        <div class="product-icon" style="background:${p.color}20; border:1px solid ${p.color}40">${p.icon}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-count">${p.scenarios.length}</div>
      </div>`;
    sidebar.appendChild(div);
  });
}

// ─── SELECT PRODUCT ──────────────────────────────────────────────────────────
function selectProduct(id) {
  currentProduct = id;
  renderSidebar();
  renderContent();
}

// ─── FILTER TYPE ─────────────────────────────────────────────────────────────
function filterType(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentProduct) renderContent();
}

// ─── FILTER ALL (search) ─────────────────────────────────────────────────────
function filterAll() {
  if (currentProduct) renderContent();
}

// ─── RENDER CONTENT ──────────────────────────────────────────────────────────
function renderContent() {
  const product = products.find(p => p.id === currentProduct);
  if (!product) return;
  const content = document.getElementById('content');
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = product.scenarios.filter(s => {
    const matchType = currentFilter === 'all' || s.type === currentFilter;
    const matchSearch = !search ||
      s.title.toLowerCase().includes(search) ||
      s.prerequis.join(' ').toLowerCase().includes(search) ||
      s.verification.join(' ').toLowerCase().includes(search) ||
      s.n1.join(' ').toLowerCase().includes(search) ||
      (s.n2 && s.n2.join(' ').toLowerCase().includes(search));
    return matchType && matchSearch;
  });

  const typeLabels = {
    reclamation: '<span class="scenario-type type-reclamation">Réclamation</span>',
    demande: '<span class="scenario-type type-demande">Demande</span>',
    incident: '<span class="scenario-type type-incident">Incident</span>',
    information: '<span class="scenario-type type-information">Information</span>',
  };

  content.innerHTML = `
    <div class="product-header">
      <div class="product-header-icon" style="background:${product.color}20; border:1px solid ${product.color}40">${product.icon}</div>
      <div>
        <div class="product-title">${product.name}</div>
        <div class="product-desc">${product.desc}</div>
      </div>
      <div class="quick-stats" style="margin-left:auto; align-self:flex-start; display:flex; gap:6px; flex-wrap:wrap;">
        <span class="stat-pill tag-reclamation">🔴 ${product.scenarios.filter(s=>s.type==='reclamation').length} Récl.</span>
        <span class="stat-pill tag-incident">🟡 ${product.scenarios.filter(s=>s.type==='incident').length} Incid.</span>
        <span class="stat-pill tag-demande">🔵 ${product.scenarios.filter(s=>s.type==='demande').length} Dem.</span>
        <span class="stat-pill tag-info">🟢 ${product.scenarios.filter(s=>s.type==='information').length} Info</span>
      </div>
    </div>
    <div class="scenarios-grid" id="scenariosGrid"></div>`;

  const grid = document.getElementById('scenariosGrid');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">Aucun scénario trouvé pour ce filtre.</div>';
    return;
  }

  filtered.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'scenario-card';
    card.innerHTML = `
      <div class="scenario-header" onclick="toggleCard(this)">
        ${typeLabels[s.type]}
        <div class="scenario-title">${s.title}</div>
        <span class="sla-badge sla-${s.slaLevel}">⏱ ${s.sla}</span>
        <span class="chevron">›</span>
      </div>
      <div class="scenario-body">
        <div class="steps-row">
          <div class="step-block prérequis">
            <div class="step-label"><div class="step-dot dot-prérequis"></div>Prérequis</div>
            <ul>${s.prerequis.map(x=>`<li>${x}</li>`).join('')}</ul>
          </div>
          <div class="step-block verification">
            <div class="step-label"><div class="step-dot dot-verification"></div>Vérifications préalables</div>
            <ul>${s.verification.map(x=>`<li>${x}</li>`).join('')}</ul>
          </div>
          <div class="step-block n1">
            <div class="step-label"><div class="step-dot dot-n1"></div>Traitement Niveau 1 (Agence)</div>
            <ul>${s.n1.map(x=>`<li>${x}</li>`).join('')}</ul>
          </div>
          <div class="step-block n2">
            <div class="step-label"><div class="step-dot dot-n2"></div>Traitement Niveau 2 (Back Office)</div>
            <ul>${(s.n2||['Traitement direct N1 suffisant']).map(x=>`<li>${x}</li>`).join('')}</ul>
          </div>
        </div>
        ${s.escalade ? `<div class="escalade-note">⚠️ <span><strong>Règle d'escalade :</strong> ${s.escalade}</span></div>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

// ─── TOGGLE CARD ─────────────────────────────────────────────────────────────
function toggleCard(header) {
  const card = header.parentElement;
  card.classList.toggle('open');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
